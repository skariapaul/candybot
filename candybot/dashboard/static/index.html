<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>candybot</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="viz-root">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🍬</span>
        <span class="brand-name">candybot</span>
        <span class="brand-sub">AMD Physical AI demo</span>
      </div>
      <div id="state-badge" class="state-badge" data-state="IDLE">
        <span class="state-dot" aria-hidden="true"></span>
        <span class="state-label">Idle</span>
      </div>
    </header>

    <section class="hardware-panel">
      <div class="panel-head">
        <h2>This laptop -- live inference hardware</h2>
        <span id="device-badge" class="device-badge">probing…</span>
      </div>

      <div class="metric-grid" id="telemetry-grid">
        <div class="metric-tile" data-metric="cpu">
          <div class="metric-head">
            <span class="metric-label">CPU</span>
            <span class="metric-value" id="stat-cpu">—</span>
          </div>
          <svg class="sparkline" id="spark-cpu" viewBox="0 0 100 28" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="meter-track"><div class="meter-fill" id="meter-cpu" style="width:0%"></div></div>
        </div>

        <div class="metric-tile" data-metric="ram">
          <div class="metric-head">
            <span class="metric-label">RAM</span>
            <span class="metric-value" id="stat-ram">—</span>
          </div>
          <svg class="sparkline" id="spark-ram" viewBox="0 0 100 28" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="meter-track"><div class="meter-fill" id="meter-ram" style="width:0%"></div></div>
        </div>

        <div class="metric-tile" data-metric="gpu">
          <div class="metric-head">
            <span class="metric-label">GPU utilization</span>
            <span class="metric-value" id="stat-gpu">—</span>
          </div>
          <svg class="sparkline" id="spark-gpu" viewBox="0 0 100 28" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="meter-track"><div class="meter-fill" id="meter-gpu" style="width:0%"></div></div>
        </div>

        <div class="metric-tile" data-metric="vram">
          <div class="metric-head">
            <span class="metric-label">VRAM</span>
            <span class="metric-value" id="stat-vram">—</span>
          </div>
          <svg class="sparkline" id="spark-vram" viewBox="0 0 100 28" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div class="meter-track"><div class="meter-fill" id="meter-vram" style="width:0%"></div></div>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-chip"><span class="muted-label">GPU temp</span><span id="stat-gpu-temp">—</span></div>
        <div class="detail-chip"><span class="muted-label">VRAM used</span><span id="stat-vram-detail">—</span></div>
        <div class="detail-chip"><span class="muted-label">Inference target</span><span id="stat-device-note">—</span></div>
      </div>
    </section>

    <main class="layout">
      <section class="camera-panel">
        <div class="panel-head">
          <h2>Wrist camera</h2>
          <span id="camera-status" class="muted-tag">connecting…</span>
        </div>
        <div class="camera-frame">
          <img id="camera-feed" src="/camera" alt="Live wrist camera feed" />
        </div>
        <div class="dialogue-strip">
          <span class="muted-label">Dialogue</span>
          <span id="dialogue-stage">—</span>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-head">
          <h2>Transcript</h2>
        </div>
        <ol id="transcript-log" class="transcript-log" aria-live="polite"></ol>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
