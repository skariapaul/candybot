<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>candybot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="viz-root">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🍬</span>
        <span class="brand-name">candybot</span>
        <span class="brand-sub">AMD Physical AI demo</span>
      </div>
      <div id="state-badge" class="state-badge" data-state="IDLE">
        <span class="state-dot" aria-hidden="true"></span>
        <span class="state-label">Idle</span>
      </div>
    </header>

    <main class="layout">
      <section class="camera-panel">
        <div class="panel-head">
          <h2>Wrist camera</h2>
          <span id="camera-status" class="muted-tag">connecting…</span>
        </div>
        <div class="camera-frame">
          <img id="camera-feed" src="/camera" alt="Live wrist camera feed" />
        </div>
        <div class="dialogue-strip">
          <span class="muted-label">Dialogue</span>
          <span id="dialogue-stage">—</span>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-head">
          <h2>This laptop</h2>
        </div>
        <div class="stat-grid" id="telemetry-grid">
          <div class="stat-tile" data-metric="device">
            <span class="stat-label">Inference device</span>
            <span class="stat-value" id="stat-device">probing…</span>
            <span class="stat-note" id="stat-device-note"></span>
          </div>

          <div class="meter-tile" data-metric="cpu">
            <div class="meter-head">
              <span class="stat-label">CPU</span>
              <span class="meter-value" id="stat-cpu">—</span>
            </div>
            <div class="meter-track"><div class="meter-fill" id="meter-cpu" style="width:0%"></div></div>
          </div>

          <div class="meter-tile" data-metric="ram">
            <div class="meter-head">
              <span class="stat-label">RAM</span>
              <span class="meter-value" id="stat-ram">—</span>
            </div>
            <div class="meter-track"><div class="meter-fill" id="meter-ram" style="width:0%"></div></div>
          </div>

          <div class="meter-tile" data-metric="gpu">
            <div class="meter-head">
              <span class="stat-label">GPU (ROCm)</span>
              <span class="meter-value" id="stat-gpu">—</span>
            </div>
            <div class="meter-track"><div class="meter-fill" id="meter-gpu" style="width:0%"></div></div>
          </div>

          <div class="stat-tile" data-metric="gpu-temp">
            <span class="stat-label">GPU temp</span>
            <span class="stat-value" id="stat-gpu-temp">—</span>
          </div>
        </div>

        <div class="panel-head transcript-head">
          <h2>Transcript</h2>
        </div>
        <ol id="transcript-log" class="transcript-log" aria-live="polite"></ol>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
