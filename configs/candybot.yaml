# candybot central config. Env vars in .env override these where noted (see candybot/config.py).

robot:
  type: so101_follower
  port: /dev/so101_follower   # stable symlink installed by scripts/udev/99-so101.rules
  id: candybot_follower
  calibration_path: configs/candybot_follower.json   # generated by lerobot-calibrate (--robot.calibration_dir=configs), gitignored
  action_mode: scripted        # scripted | policy — scripted works today, policy needs a trained checkpoint
  # Caps how far any single send_action() call may move a joint (same units as goal
  # positions -- normalized -100..100 range since use_degrees=False). Conservative
  # placeholder; tune during physical bring-up in scripts/teleop_test.sh / scripted_actions.py.
  max_relative_target: 20

  # Fixed bin waypoint sets (radians / gripper positions), filled in during scripted_actions.py bring-up.
  bins:
    chocolate:
      waypoints_file: candybot/robot/waypoints/chocolate.json
      policy_checkpoint: null   # set by scripts/pull_checkpoint.sh chocolate
      dataset_repo_id: null     # e.g. "<hf_user>/candybot_chocolate" -- must match training/train_act.sh
    candy:
      waypoints_file: candybot/robot/waypoints/candy.json
      policy_checkpoint: null
      dataset_repo_id: null

camera:
  # Set after scripts/probe_hardware.py disambiguates the real capture node (video4 vs video5, metadata node etc.)
  device: /dev/video4
  width: 640
  height: 480
  fps: 15
  # This camera's auto-exposure badly underexposed this room's mixed lighting (near-black
  # frames). Manual values below are tuned for THIS location as of 2026-07-19 -- re-tune at
  # a new venue with `v4l2-ctl -d /dev/video4 --list-ctrls` / `--set-ctrl=...`.
  auto_exposure: 1        # 1=manual, 3=auto (aperture priority)
  exposure_time_absolute: 400
  gain: 30

audio:
  # Switch here, or override per-launch: CANDYBOT_AUDIO_PROFILE=laptop python -m candybot.orchestrator.run
  profile: laptop   # usb_headset | laptop
  profiles:
    usb_headset:
      input_device_name_hint: "USB Audio"   # matched against sounddevice.query_devices() names
      output_device_name_hint: "USB Audio"
    laptop:
      input_device_name_hint: "ALC215"      # built-in mic/speaker
      output_device_name_hint: "ALC215"
  sample_rate: 16000   # ASR target rate; recording/playback auto-resample from whatever the device natively uses

voice:
  trigger_mode: push_to_talk    # push_to_talk | wake_word — push-to-talk preferred on a loud floor
  push_to_talk:
    key: space                  # booth button enumerates as this keycode via pynput
  wake_word:
    model: hey_jarvis            # interim community model; a custom "hey candybot" model is a stretch goal
    threshold: 0.5
  asr:
    model_size: base.en
    vad_filter: true
  tts:
    voice_model: en_US-lessac-medium

dialogue:
  max_name_attempts: 3
  max_item_attempts: 2
  item_choice_default: candy   # fallback if the visitor's answer can't be resolved after retries

dashboard:
  host: 0.0.0.0
  port: 8080

hardware:
  # Preferred device is probed at startup by candybot/hardware_probe.py (subprocess/timeout guarded);
  # this is only a hint for scripts, not a hard override — real code never hardcodes "cuda".
  preferred_device: cuda
  hsa_override_gfx_version: "9.0.0"   # gfx900, nearest ROCm-supported neighbor to this laptop's gfx902
